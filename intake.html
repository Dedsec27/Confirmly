<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Join Confirmly</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"><style>:root{--ink:#19211e;--muted:#68756e;--line:#dce6de;--green:#1d8154;--mint:#dff4e5}*{box-sizing:border-box}body{margin:0;background:#f5f8f5;color:var(--ink);font-family:'DM Sans',sans-serif;min-height:100vh;display:grid;place-items:center;padding:22px}.card{width:min(520px,100%);background:#fff;border:1px solid var(--line);border-radius:22px;padding:28px;box-shadow:0 18px 60px rgba(27,55,38,.08)}.brand{display:flex;align-items:center;gap:9px;font:700 21px 'Space Grotesk'}.mark{display:grid;place-items:center;width:28px;height:28px;background:#baf1c9;color:#16412a;border-radius:9px}.eyebrow{margin:28px 0 8px;color:#718078;font-size:10px;font-weight:700;letter-spacing:.12em}.business{margin:0;font:700 28px 'Space Grotesk';letter-spacing:-.8px}.copy{margin:9px 0 22px;color:var(--muted);font-size:14px;line-height:1.5}label{display:grid;gap:7px;color:#536159;font-size:12px;font-weight:700;margin:0 0 14px}input,select{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;padding:12px;font:14px 'DM Sans';color:var(--ink)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.consent{display:flex;gap:10px;align-items:flex-start;padding:12px;border:1px solid #e1e9e3;border-radius:12px;margin:10px 0}.consent input{width:auto;margin-top:3px}.consent strong{display:block;font-size:13px}.consent small{display:block;margin-top:3px;color:var(--muted);line-height:1.35}.submit{width:100%;margin-top:12px;border:0;border-radius:10px;padding:13px;background:var(--green);color:#fff;font:700 14px 'DM Sans';cursor:pointer}.success{display:none;text-align:center;padding:24px 8px}.success .tick{margin:auto auto 12px;display:grid;place-items:center;width:46px;height:46px;border-radius:50%;background:var(--mint);color:var(--green);font-size:24px;font-weight:700}.success h2{font:700 24px 'Space Grotesk';margin:0}.success p{color:var(--muted);line-height:1.5}@media(max-width:520px){.card{padding:22px}.grid{grid-template-columns:1fr}}</style></head><body><main class="card"><div class="brand"><span class="mark">✓</span>confirmly</div><section id="formSection"><p class="eyebrow">CUSTOMER PROFILE</p><h1 class="business" id="businessName">Your business</h1><p class="copy">Add your details to receive booking reminders in the way that suits you.</p><form id="intakeForm"><label class="full">Your name<input name="name" required autocomplete="name" placeholder="e.g. Sofia Petrou"></label><div class="grid"><label>Phone number<input name="phone" autocomplete="tel" inputmode="tel" placeholder="+30 69…"></label><label>Email address<input name="email" type="email" autocomplete="email" placeholder="you@email.com"></label></div><label>Preferred reminder channel<select name="preferredChannel"><option>Email</option><option>WhatsApp</option><option>SMS</option></select></label><label class="consent"><input type="checkbox" name="reminderConsent" checked required><span><strong>Appointment reminders</strong><small>I agree to receive booking reminders and appointment updates.</small></span></label><label class="consent"><input type="checkbox" name="marketingConsent"><span><strong>Offers and updates</strong><small>I would like occasional news and offers.</small></span></label><label class="consent"><input type="checkbox" name="whatsappOptIn"><span><strong>WhatsApp opt-in</strong><small>I agree to receive WhatsApp messages.</small></span></label><button class="submit" type="submit">Create my profile</button></form></section><section class="success" id="successSection"><div class="tick">✓</div><h2>You’re all set.</h2><p>Your details have been submitted to the business. You can close this page.</p></section></main><script>const p=new URLSearchParams(location.search),business=p.get('business')||'Your business',workspace=p.get('workspace')||'';document.getElementById('businessName').textContent=business;document.getElementById('intakeForm').addEventListener('submit',async e=>{e.preventDefault();const fd=new FormData(e.currentTarget),data={workspaceKey:workspace,name:String(fd.get('name')||'').trim(),phone:String(fd.get('phone')||'').trim(),email:String(fd.get('email')||'').trim().toLowerCase(),preferredChannel:fd.get('preferredChannel'),reminderConsent:fd.get('reminderConsent')==='on',marketingConsent:fd.get('marketingConsent')==='on',whatsappOptIn:fd.get('whatsappOptIn')==='on'};if(!data.phone&&!data.email){alert('Add a phone number or email address.');return}const submit=e.currentTarget.querySelector('button[type=submit]');submit.disabled=true;submit.textContent='Saving profile…';try{const r=await fetch('/api/customer-intake',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const payload=await r.json().catch(()=>({}));if(!r.ok)throw new Error(payload.error||'Could not save your profile.');document.getElementById('formSection').style.display='none';document.getElementById('successSection').style.display='block'}catch(error){alert(error.message||'Could not save your profile. Please ask the business to try again.');submit.disabled=false;submit.textContent='Create my profile'}})</script></body></html>
